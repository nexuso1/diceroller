<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Dice Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
      mount({
        requirements: ["pandas", "numpy", "matplotlib", "plotly"], // Add your pip packages here (e.g., ["pandas", "numpy"])
        entrypoint: "app.py",
        files: {
          // This tells stlite to fetch your actual app.py file from your repository
          "app.py": {
            url: "app.py",
          },
          "calc.py": {
            url: "calc.py",
          },
          "operators.py": {
            url: "operators.py",
          },
        },
      }, document.getElementById("root"),);
    </script>
  </body>
</html>
