<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Dice Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: [], // Add your pip packages here (e.g., ["pandas", "numpy"])
        entrypoint: "app.py",
        files: {
          // This tells stlite to fetch your actual app.py file from your repository
          "app.py": {
            url: "app.py",
          },
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
