<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roll Statistic Calculator</title>
    <!-- Include Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: ui-monospace, Consolas, system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            background-color: white;
            padding: 2.5rem;
        }
        h1 {
            text-align: center;
            font-size: 4rem;
            color: #1e293b;
            margin-bottom: 4rem;
        }
        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .input-wrapper {
            flex-grow: 1;
        }
        label {
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f1f5f9;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            background-color: #fff;
        }
        button {
            padding: 0.85rem 2rem;
            background-color: #ff4a4a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: justify;
            gap: 0.5rem;
        }
        button:hover {
            background-color: #e03e3e;
        }

        .key-badge {
            color: #f8e8e8;
        }
        
        /* Layout Grid for Results */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1.5fr;
            }
        }

        /* Result Table styling */
        .result-section {
            display: none; /* Revealed on successful fetch */
        }
        .table-container {
            background-color: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* Usage Guide styling */
        .usage-guide {
            border-top: 1px solid #e2e8f0;
            padding-top: 2rem;
            margin-top: 2.5rem;
            color: #334155; /* Modern slate text */
            line-height: 1.625;
        }

        /* Headers */
        .usage-guide h1, 
        .usage-guide h2, 
        .usage-guide h3 {
            color: #1e293b;
            font-weight: 700;
            margin-top: 1.75rem;
            margin-bottom: 0.75rem;
            text-align: left;
        }

        .usage-guide h1 { font-size: 3rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
        .usage-guide h2 { font-size: 2rem; }
        .usage-guide h3 { font-size: 1.4rem; }

        /* Paragraphs and spacing */
        .usage-guide p {
            margin-top: 0;
            margin-bottom: 1rem;
        }

        /* Lists */
        .usage-guide ul, 
        .usage-guide ol {
            margin-top: 0;
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        .usage-guide li {
            margin-bottom: 0.5rem;
        }

        /* Bold/Strong text */
        .usage-guide strong {
            color: #0f172a;
            font-weight: 600;
        }

        /* Inline Code Badges (like `d20` or `+`) */
        .usage-guide code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
            color: #0f172a;
        }

        /* Fenced Code Blocks (```sh, ```python, etc.) */
        .usage-guide pre {
            background-color: #0f172a; /* Dark background to match modern terminals */
            color: #f8fafc;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            overflow-x: auto; /* Adds a scrollbar if expressions are super long */
            margin: 1rem 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* Inside pre, strip inline code badges borders and styling */
        .usage-guide pre code {
            background: none;
            border: none;
            padding: 0;
            color: inherit;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Blockquotes */
        .usage-guide blockquote {
            margin: 1rem 0;
            padding-left: 1rem;
            border-left: 4px solid #cbd5e1;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Roll Statistic Calculator</h1>
    
    <!-- Input Section -->
    <form id="calc-form">
        <div class="input-group">
            <div class="input-wrapper">
                <label for="expression">Input dice expression:</label>
                <input type="text" id="expression" placeholder="Type an expression, e.g (d20 max d20 + 5 >= 15) * (2d6 + 5)" value="(d20 max d20 + 5 >= 15) * (2d6 + 5)" required>
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button type="submit" id="submit-btn">Simulate <span class="key-badge">S</span></button>
            </div>
        </div>
    </form>

    <!-- Error Message Banner -->
    <div id="error-message" class="error"></div>

    <!-- Output Dashboard (reveals dynamically) -->
    <div id="dashboard" class="result-section">
        <div class="dashboard-grid">
            <!-- Left Side: Result Summary Table -->
            <div>
                <h2 style="margin-top: 0; font-size: 1.5rem; margin-bottom: 1rem;">Result Summary</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Metric</th>
                                <th>Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Mean</td>
                                <td id="val-mean" style="font-weight: 600;">-</td>
                            </tr>
                            <tr>
                                <td>Median</td>
                                <td id="val-median" style="font-weight: 600;">-</td>
                            </tr>
                            <tr>
                                <td>Standard deviation (bias corrected)</td>
                                <td id="val-std" style="font-weight: 600;">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Side: Chart.js Distribution Canvas -->
            <div>
                <div class="chart-container">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Usage Guide -->
    <div class="usage-guide">
        {{ guide_html|safe }}
    </div>
</div>

<script type=text/javascript src="{{
  url_for('static', filename='script.js')
}}"></script>

</body>
</html>
